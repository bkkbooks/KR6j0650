body:
  text: 三藏法師義淨奉制譯僧慎爾耶此云正了知此正了知王有二十八藥叉大將佛告阿難陀言此二十八部藥叉現大自在神通威德能於十方世界覆護一切衆生為除衰患厄難之事有四藥叉大將住在東面擁護東方所有衆生令離憂苦其名曰地嘌伽長大蘇泥怛羅妙目晡𠷈拏圓滿却畢羅黃色唱已説所求事下準此阿難陀有四藥叉大將住在南面擁護南方所有衆生令離憂苦其名曰僧訶師子塢波僧訶小師子商企羅螺旃憚那栴檀復阿難陀有四藥叉大將住在西面擁護西方所有衆生令離憂苦其名曰喝里師子𭧸里雞舍師子髮鉢喇部自在氷伽羅青色復阿難陀有四藥叉大將住在北面擁護北方所有衆生令離憂苦其名曰達喇拏能持達喇難陀持喜嗢猶伽波羅勇進勤護吠率奴天名復阿難陀有四藥叉大將各住四維擁護四維所有衆生令離憂苦其名曰半支迦有五般遮羅健荼五處娑跢祇利平山醯摩跋多雪山復次阿難陀有四藥叉大將住在地上擁護所有地居衆生令離憂苦其名曰部摩地蘇部摩妙地哥羅黑塢波哥羅小黑復次阿難陀有四藥叉大將住在空中擁護所有空居衆生令離憂苦其名曰蘇利耶日神蘇摩月神惡祁尼火神婆庾風神佛言此鎮護法如説唱其名號守護八方上下利安一切衆生其藥叉利生相無量無邊略説少分佛説此法已若召請之時名字之終加速來句不越本誓必垂來影印尋之孔明王經云蘇師奴藥叉住那羯羅國已上師曰蘇師奴此云正了知亦云妙了知云云
